<head>

<body>
                  <form name=frm1>
                       <table align="center" border="1">
                        <tr>
                             <th colspan="4"><strong>Registration form<strong></th>

                        <tr>
                            <td>student name</td>

                        </tr>
                        <tr>
                            <td>date of birth</td>

                        </tr>

                        <tr>
                        <td>
                            state
