<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        body {
            place-self: center;
            margin: 100px;
        }

        div {
            border-radius: 5px;
        }

        .container {
            border: 1px solid black;
            border-radius: 0;
            position: relative;
            height: 260px;
            width: 200px;
            justify-content: center;
            background-color: rgb(182, 175, 175);
            box-shadow: 2px 2px 2px rgb(123, 123, 123);
        }

        .calc {

            margin: 5px;
            background-color: rgb(182, 175, 175);
            width: auto;
            height: auto;
            display: inline-grid;
            grid-template-columns: repeat(4, 46px);
            justify-content: center;
            place-content: center;
        }

        .result {
            margin-left: 7px;
            margin-top: 5px;
            margin-right: 10px;
            background-color: white;
            border: 1px solid black;
            border-radius: 0px;
            padding: 3px;
            font-weight: bolder;
        }

        .grid {
            border: 1px solid black;
            margin: 2px;
            padding: 10px;
            background-color: rgb(23, 144, 144);
            text-align: center;
            color: white;

        }

        .grid:hover {
            background-color: lightseagreen;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="display" class="result">0</div>
        <div class="calc">
            <div class="grid btn-clear" onclick="clearDisplay()">C</div>
            <div class="grid" onclick="appendToDisplay('%')">%</div>
            <div class="grid" onclick="backspace()">&#9003;</div>
            <div class="grid" onclick="appendToDisplay('/')">/</div>
            <div class="grid" onclick="appendToDisplay('7')">7</div>
            <div class="grid" onclick="appendToDisplay('8')">8</div>
            <div class="grid" onclick="appendToDisplay('9')">9</div>
            <div class="grid" onclick="appendToDisplay('*')">*</div>
            <div class="grid" onclick="appendToDisplay('4')">4</div>
            <div class="grid" onclick="appendToDisplay('5')">5</div>
            <div class="grid" onclick="appendToDisplay('6')">6</div>
            <div class="grid" onclick="appendToDisplay('-')">-</div>
            <div class="grid" onclick="appendToDisplay('1')">1</div>
            <div class="grid" onclick="appendToDisplay('2')">2</div>
            <div class="grid" onclick="appendToDisplay('3')">3</div>
            <div class="grid" onclick="appendToDisplay('+')">+</div>
            <div class="grid" onclick="appendToDisplay('00')">00</div>
            <div class="grid" onclick="appendToDisplay('0')">0</div>
            <div class="grid" onclick="appendToDisplay('.')">.</div>
            <div class="grid btn-eq" onclick="calculate()">=</div>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendToDisplay(input) {
            if (display.innerText === "0" || display.innerText === "Error") {
                display.innerText = input;
            } else {
                display.innerText += input;
            }
        }
        function clearDisplay() {
            display.innerText = "0";
        }
        function backspace() {
            if (display.innerText.length > 1) {
                display.innerText = display.innerText.slice(0, -1);
            } else {
                display.innerText = "0";
            }
        }
        function calculate() {
            display.innerText = eval(display.innerText);
        }
    </script>
</body>
</html>
