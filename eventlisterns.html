<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listener</title>
    <style>
        #btn1 {
            border: 2px dotted black;
            height: 50px;
            width: 100px;
            margin: 20px;
        }
        #btn2 {
            border: 2px solid black;
            height: 50px;
            width: 100px;
            margin: 20px;
        }
        #btn3 {
            border: 2px dashed black;
            height: 50px;
            width: 100px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="box1" onmousemove="style.backgroundColor='grey'" onmouseout="style.backgroundColor='white'">
        <button id="btn1">Click It</button>
        <button id="btn2">Click It</button>
        <button id="btn3">Right Click</button>
    </div>
    <script>
        const btn = document.getElementById("btn1");
        btn.addEventListener("click", function () {
            btn.style.backgroundColor = "lightgreen";
            btn.style.color = "white";
        })
        const btn2 = document.getElementById("btn2");
        btn2.addEventListener("click", function () {
            btn2.style.backgroundColor = "lightpink";
            btn2.style.color = "white";
        })
        btn2.addEventListener("dblclick", function () {
            btn2.style.backgroundColor = "darkblue";
            btn2.style.color = "white";
        })
        const btn3 = document.getElementById("btn3");
        btn3.addEventListener("contextmenu", function () {
            btn3.style.backgroundColor = "lightyellow";
            btn3.style.color = "black";
        })
    </script>
</body>
</html>
